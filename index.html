<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>救急活動 タイムスタンプ記録</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #C0392B;
    --red-dark: #96281B;
    --red-light: #E74C3C;
    --navy: #1A2A3A;
    --navy-light: #243447;
    --cream: #F5F0E8;
    --gold: #D4AC0D;
    --gray: #7F8C8D;
    --light: #ECF0F1;
    --white: #FFFFFF;
    --green: #27AE60;
    --orange: #E67E22;
  }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* === HEADER === */
  header {
    background: var(--red);
    padding: 12px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .badge {
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    font-size: 10px;
    padding: 2px 8px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .clock {
    font-size: 32px;
    font-weight: 200;
    letter-spacing: 4px;
    font-variant-numeric: tabular-nums;
    margin-top: 4px;
    text-align: center;
  }
  .elapsed-bar {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 4px;
    font-size: 11px;
    opacity: 0.75;
    letter-spacing: 1px;
  }
  .elapsed-val { font-weight: 700; color: var(--gold); }

  /* === PATIENT INFO === */
  .info-section {
    background: var(--navy-light);
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .info-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .info-row:last-child { margin-bottom: 0; }
  .info-label {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--gold);
    font-weight: 700;
    text-transform: uppercase;
    width: 60px;
    flex-shrink: 0;
  }
  .info-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: var(--white);
    font-size: 14px;
    padding: 6px 10px;
    outline: none;
    -webkit-appearance: none;
  }
  .info-input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.1);
  }
  select.info-input option { background: var(--navy); }

  /* === PHASE INDICATOR === */
  .phase-bar {
    display: flex;
    overflow-x: auto;
    gap: 4px;
    padding: 10px 16px;
    background: var(--navy);
    scrollbar-width: none;
  }
  .phase-bar::-webkit-scrollbar { display: none; }
  .phase-pill {
    flex-shrink: 0;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .phase-pill.done { border-color: var(--green); color: var(--green); background: rgba(39,174,96,0.1); }
  .phase-pill.active { border-color: var(--red-light); color: var(--white); background: var(--red); }

  /* === ACTION BUTTONS === */
  .section-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight: 700;
    text-transform: uppercase;
    padding: 12px 16px 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 16px 12px;
  }
  .btn-grid.single { grid-template-columns: 1fr; }
  .period-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    padding: 0 16px 10px;
  }
  .period-btn {
    background: var(--navy-light);
    border: 1.5px solid rgba(231,76,60,0.35);
    border-radius: 8px;
    color: var(--white);
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    padding: 8px 4px;
    text-align: center;
    line-height: 1.3;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .period-btn:active { transform: scale(0.94); }
  .period-btn.pressed {
    background: rgba(231,76,60,0.2);
    border-color: var(--red-light);
    color: var(--red-light);
  }
  .period-btn .p-time {
    display: block;
    font-size: 9px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
  }
  .period-btn.pressed .p-time { color: rgba(231,76,60,0.7); }

  .act-btn {
    background: var(--navy-light);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--white);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 14px 10px;
    text-align: center;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    line-height: 1.3;
  }
  .act-btn .btn-time {
    display: block;
    font-size: 10px;
    font-weight: 400;
    color: var(--gold);
    margin-top: 3px;
    font-variant-numeric: tabular-nums;
  }
  .act-btn:active { transform: scale(0.96); }
  .act-btn.pressed {
    background: rgba(39,174,96,0.15);
    border-color: var(--green);
    color: var(--green);
  }
  .act-btn.pressed .btn-time { color: var(--green); }
  .btn-count {
    display: inline-block;
    margin-top: 2px;
    font-size: 10px;
    font-weight: 700;
    background: var(--red);
    color: #fff;
    border-radius: 10px;
    padding: 1px 5px;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .act-btn.pressed .btn-count { background: var(--green); }
  /* 回数カウント付きボタンのフォント縮小 */
  .has-count { font-size: 11px !important; }
  .has-count .btn-time { font-size: 9px !important; }
  .btn-elapsed {
    display: block;
    font-size: 9px;
    font-weight: 600;
    margin-top: 2px;
    color: rgba(255,255,255,0.55);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }
  .act-btn.pressed .btn-elapsed { color: rgba(39,174,96,0.8); }
  .dur-banner {
    margin: 0 16px 8px;
    background: rgba(212,172,13,0.1);
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .dur-label { font-size:11px; color:var(--gold); font-weight:700; letter-spacing:1px; margin-bottom:6px; }
  .dur-banner-multi { flex-direction: column; align-items: stretch; }
  .dur-list { display: flex; flex-direction: column; gap: 4px; }
  .dur-row {
    display: grid;
    grid-template-columns: 18px 1fr auto;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 12px;
  }
  .dur-row-num { color: var(--gold); font-weight:700; font-size:11px; text-align:center; }
  .dur-row-range { color: var(--gray); font-size:11px; }
  .dur-row-val { color: var(--white); font-weight:700; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .dur-range { font-size:10px; color:var(--gray); }
  .dur-val { font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--white); white-space:nowrap; }

  .toggle-btn[data-state="idle"] { border-color: rgba(255,255,255,0.15); }
  .toggle-btn[data-state="running"] {
    border-color: var(--red-light);
    background: rgba(231,76,60,0.15);
    animation: pulse-border 1.2s ease-in-out infinite;
  }
  .toggle-btn[data-state="running"] .toggle-label { color: var(--red-light); }
  .toggle-btn[data-state="running"] .btn-time { color: var(--red-light); }
  .toggle-btn[data-state="done"] { border-color: var(--green); background: rgba(39,174,96,0.12); }
  .toggle-btn[data-state="done"] .toggle-label { color: var(--green); }
  .toggle-btn[data-state="done"] .btn-time { color: var(--green); }
  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(231,76,60,0); }
  }

  /* Phase-specific colors */
  .act-btn[data-phase="dispatch"] { border-color: rgba(231,76,60,0.4); }
  .act-btn[data-phase="scene"] { border-color: rgba(52,152,219,0.4); }
  .act-btn[data-phase="treatment"] { border-color: rgba(155,89,182,0.4); }
  .act-btn[data-phase="transport"] { border-color: rgba(230,126,34,0.4); }
  .act-btn[data-phase="hospital"] { border-color: rgba(39,174,96,0.4); }

  /* === LOG === */
  .log-section {
    background: var(--navy-light);
    margin: 0 16px 16px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .log-header {
    background: rgba(255,255,255,0.05);
    padding: 8px 14px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight: 700;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .log-count {
    background: var(--red);
    border-radius: 20px;
    font-size: 10px;
    padding: 1px 8px;
    color: white;
    font-weight: 700;
  }
  .log-list { max-height: 320px; overflow-y: auto; }
  .log-col-header {
    display: grid;
    grid-template-columns: 58px 1fr 90px;
    gap: 6px;
    padding: 5px 14px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 1px;
  }
  .log-item {
    display: grid;
    grid-template-columns: 58px 1fr 90px;
    gap: 6px;
    padding: 9px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    align-items: center;
    font-size: 13px;
  }
  .log-item:last-child { border-bottom: none; }
  .log-time { font-variant-numeric: tabular-nums; color: var(--gold); font-size: 12px; font-weight: 700; }
  .log-label { font-size: 12px; }
  .log-elapsed {
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    font-weight: 700;
    white-space: nowrap;
  }
  .log-elapsed.before { color: #5DADE2; }
  .log-elapsed.after  { color: var(--green); }
  .log-elapsed.zero   { color: var(--gold); }
  .log-empty {
    padding: 24px;
    text-align: center;
    color: var(--gray);
    font-size: 13px;
  }

  /* === MEMO === */
  .memo-wrap { padding: 0 16px 12px; }
  textarea.memo-input {
    width: 100%;
    background: var(--navy-light);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--white);
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
    min-height: 70px;
    font-family: inherit;
  }
  textarea.memo-input:focus { border-color: var(--gold); }

  /* === BOTTOM ACTIONS === */
  .bottom-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 16px 24px;
  }
  .action-btn {
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    padding: 14px;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .action-btn:active { transform: scale(0.96); }
  .btn-reset { background: rgba(255,255,255,0.08); color: var(--light); }
  .btn-pdf { background: var(--red); color: var(--white); grid-column: 1 / -1; font-size: 15px; }

  /* === MODAL === */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--navy-light);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 340px;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .modal h3 { font-size: 16px; margin-bottom: 8px; color: var(--gold); }
  .modal p { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 20px; line-height: 1.6; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn { flex: 1; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .modal-cancel { background: rgba(255,255,255,0.1); color: var(--white); }
  .modal-confirm { background: var(--red); color: var(--white); }
  .mode-btn {
    flex: 1;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-weight: 700;
    padding: 7px 10px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .mode-btn.mode-active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 0 10px rgba(192,57,43,0.4);
  }
  #modeBtn_cpa.mode-active {
    background: #C0392B;
    border-color: #E74C3C;
    box-shadow: 0 0 14px rgba(231,76,60,0.6);
    animation: pulse-cpa 1.5s ease-in-out infinite;
  }
  @keyframes pulse-cpa {
    0%,100% { box-shadow: 0 0 8px rgba(231,76,60,0.5); }
    50% { box-shadow: 0 0 18px rgba(231,76,60,0.9); }
  }
  .cpa-only { display: none; }
  .normal-only { display: block; }
  body.mode-cpa .cpa-only { display: block; }
  body.mode-cpa .normal-only { display: none; }
  body.mode-cpa .btn-grid .cpa-only { display: contents; }
  body.mode-cpa .btn-grid .normal-only { display: none; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-top">
    <span class="header-title">🚑 救急活動記録</span>
    <span class="badge">訓練</span>
  </div>
  <div class="clock" id="clock">--:--:--</div>
  <div class="elapsed-bar">
    <span>出動から <span class="elapsed-val" id="elapsedDispatch">--:--</span></span>
    <span>接触から <span class="elapsed-val" id="elapsedContact">--:--</span></span>
  </div>
</header>

<!-- Mode Selector -->
<div id="modeSelectorBar" style="display:flex;align-items:center;gap:8px;padding:10px 16px;background:#131f2b;border-bottom:1px solid rgba(255,255,255,0.08);">
  <span style="font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;flex-shrink:0;">活動モード</span>
  <button id="modeBtn_normal" class="mode-btn mode-active" onclick="setMode('normal')">🚑 通常救急</button>
  <button id="modeBtn_cpa" class="mode-btn" onclick="setMode('cpa')">❤️ CPA</button>
</div>

<!-- Patient Info -->
<div class="info-section">
  <div class="info-row">
    <span class="info-label">案件番号</span>
    <input type="text" class="info-input" id="caseNo" placeholder="例）R06-0001">
  </div>
  <div class="info-row">
    <span class="info-label">傷病者</span>
    <input type="text" class="info-input" id="patientName" placeholder="氏名または仮称">
    <select class="info-input" id="patientAge" style="width:80px;flex:none">
      <option value="">年代</option>
      <option>10代</option><option>20代</option><option>30代</option>
      <option>40代</option><option>50代</option><option>60代</option>
      <option>70代</option><option>80代</option><option>90代以上</option>
    </select>
  </div>
  <div class="info-row">
    <span class="info-label">覚知区分</span>
    <select class="info-input" id="callType">
      <option value="">選択</option>
      <option>急病</option><option>外傷</option><option>交通事故</option>
      <option>転院搬送</option><option>その他</option>
    </select>
    <select class="info-input" id="severity" style="width:80px;flex:none">
      <option value="">重症度</option>
      <option>軽症</option><option>中等症</option><option>重症</option><option>重篤</option>
    </select>
  </div>
</div>

<!-- Phase Indicator -->
<div class="phase-bar" id="phaseBar">
  <div class="phase-pill active" data-phase="dispatch">出動</div>
  <div class="phase-pill" data-phase="scene">現着</div>
  <div class="phase-pill" data-phase="treatment">処置</div>
  <div class="phase-pill" data-phase="transport">搬送</div>
  <div class="phase-pill" data-phase="hospital">病着</div>
</div>

<!-- Phase 1+2: 出動・現場到着 -->
<div class="section-title">出動・現場到着</div>
<div class="btn-grid">
  <button class="act-btn" data-phase="dispatch" data-key="dispatch_out" onclick="stamp(this)">🚑 出動<span class="btn-time" id="t_dispatch_out">未記録</span></button>
  <button class="act-btn" data-phase="scene" data-key="patient_contact" onclick="stamp(this)">👤 傷病者接触<span class="btn-time" id="t_patient_contact">未記録</span></button>
</div>

<!-- Phase 3a: 評価 -->
<div class="section-title">評価</div>
<div class="btn-grid">
  <button class="act-btn toggle-btn" id="btn_assess_primary" data-phase="treatment" data-state="idle"
    data-key-start="assess_primary_start" data-key-end="assess_primary_end"
    data-label-idle="🔍 生理学的評価開始" data-label-running="🔍 生理学的評価中…" data-label-done="✅ 生理学的評価完了"
    data-banner="banner_assess_primary" onclick="toggleMeasure(this)">
    <span class="toggle-label">🔍 生理学的評価開始</span>
    <span class="btn-time">タップで開始</span>
    <span class="btn-elapsed"></span>
  </button>
  <button class="act-btn toggle-btn normal-only" id="btn_assess_secondary" data-phase="treatment" data-state="idle"
    data-key-start="assess_secondary_start" data-key-end="assess_secondary_end"
    data-label-idle="📋 二次評価開始" data-label-running="📋 二次評価中…" data-label-done="✅ 二次評価完了"
    data-banner="banner_assess_secondary" onclick="toggleMeasure(this)">
    <span class="toggle-label">📋 二次評価開始</span>
    <span class="btn-time">タップで開始</span>
    <span class="btn-elapsed"></span>
  </button>
  <button class="act-btn" data-phase="treatment" data-key="rosc" onclick="stamp(this)">💓 ROSC確認<span class="btn-time" id="t_rosc">未記録</span></button>
</div>

<!-- CPA専用セクション -->
<div class="section-title cpa-only">🚨 CPA蘇生処置</div>
<div class="btn-grid cpa-only">
  <button class="act-btn" data-phase="treatment" data-key="cpr_start" onclick="stamp(this)" id="cpa_cpr_start">❤️ CPR開始<span class="btn-time" id="t_cpa_cpr_start">未記録</span></button>
  <button class="act-btn toggle-btn" id="cpa_btn_aed_analysis" data-phase="treatment" data-state="idle"
    data-key-start="aed_analysis_start" data-key-end="aed_analysis_end"
    data-label-idle="⚡ AED解析開始" data-label-running="⚡ AED解析中…" data-label-done="✅ AED解析完了"
    data-banner="banner_aed_analysis" onclick="toggleMeasure(this)">
    <span class="toggle-label">⚡ AED解析開始</span>
    <span class="btn-time">タップで開始</span>
    <span class="btn-elapsed"></span>
  </button>
  <button class="act-btn has-count" data-phase="treatment" data-key="aed_shock" onclick="stampCount(this, 'aed_shock')" id="cpa_aed_shock">⚡ 除細動実施<span class="btn-time" id="t_cpa_aed_shock">未記録</span><span class="btn-count" id="c_cpa_aed_shock" style="display:none"></span></button>
  <button class="act-btn has-count" data-phase="treatment" data-key="adrenaline" onclick="stampCount(this, 'adrenaline')" id="cpa_adrenaline">💉 アドレナリン投与<span class="btn-time" id="t_cpa_adrenaline">未記録</span><span class="btn-count" id="c_cpa_adrenaline" style="display:none"></span></button>

    タイムスタンプ一覧
    <span class="log-count" id="logCount">0件</span>
  </div>

    <div class="log-empty">まだ記録がありません</div>
  </div>
</div>

<!-- Timeline Chart -->
<div class="section-title" id="timelineTitle" style="display:none">活動タイムライン</div>
<div id="timelineWrap" style="display:none;margin:0 16px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;">
  <canvas id="timelineCanvas" style="display:block;border-radius:10px;"></canvas>
</div>

  <button class="action-btn btn-reset" onclick="confirmReset()">🔄 リセット</button>
  <button class="action-btn btn-pdf" onclick="generatePDF()">📄 PDFレポート出力</button>
</div>

<!-- Reset Modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>⚠️ リセット確認</h3>
    <p>すべての記録が削除されます。<br>この操作は元に戻せません。</p>
    <div class="modal-btns">
      <button class="modal-btn modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-btn modal-confirm" onclick="doReset()">リセット</button>
    </div>
  </div>
</div>

<script>
// === STATE ===
let log = [];
let startTime = null;
let contactTime = null;
let clockInterval = null;

const LABELS = {
  dispatch_out: '出動',
  patient_contact: '傷病者接触',
  assess_primary: '生理学的評価開始',
  assess_secondary: '二次評価開始',
  spo2: 'SpO2測定',
  bp: '血圧測定',
  ecg: '心電図測定',
  ecg12: '12誘導測定',
  assist_ventilation: '補助換気開始',
  car_load: '車内収容',
  cpr_start: 'CPR開始',
  aed_analysis: 'AED解析',
  aed_shock: '除細動実施',
  iv_access: '静脈路確保',
  o2_start: '酸素投与',
  adrenaline: 'アドレナリン投与',
  advanced_airway: '高度気道確保',
  glucose: 'ブドウ糖投与',
  scene_leave: '現場離脱',
  stretcher: 'ストレッチャー収容',
  rosc: 'ROSC確認',
  assess_primary_start: '生理学的評価開始',
  assess_primary_end: '生理学的評価完了',
  assess_secondary_start: '二次評価開始',
  assess_secondary_end: '二次評価完了',
  aed_analysis_start: 'AED解析開始',
  aed_analysis_end: 'AED解析完了',
  iv_access_start: '静脈路確保開始',
  iv_access_end: '静脈路確保完了',
  period_1: '1ピリオド開始',
  period_2: '2ピリオド開始',
  period_3: '3ピリオド開始',
  period_4: '4ピリオド開始',
  period_5: '5ピリオド開始',
  hospital_call_start: '病院連絡開始',
  hospital_call_end: '病院連絡完了（選定）',
  transport_start: '現場出発',
  hospital_arrive: '病着',
  handover: '引き継ぎ完了'
};

// === CLOCK ===
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;

  if (startTime) {
    const diff = Math.floor((now - startTime) / 1000);
    document.getElementById('elapsedDispatch').textContent = fmtElapsed(diff);
  }
  if (contactTime) {
    const diff = Math.floor((now - contactTime) / 1000);
    document.getElementById('elapsedContact').textContent = fmtElapsed(diff);
  }
}

function fmtElapsed(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function fmtTime(date) {
  const h = String(date.getHours()).padStart(2,'0');
  const m = String(date.getMinutes()).padStart(2,'0');
  const s = String(date.getSeconds()).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

// === MODE ===
let currentMode = 'normal';
function setMode(mode) {
  currentMode = mode;
  document.body.classList.toggle('mode-cpa', mode === 'cpa');
  document.getElementById('modeBtn_normal').classList.toggle('mode-active', mode === 'normal');
  document.getElementById('modeBtn_cpa').classList.toggle('mode-active', mode === 'cpa');
  // ヘッダーバッジ更新
  const badge = document.querySelector('.badge');
  if (mode === 'cpa') {
    badge.textContent = '訓練 / CPA';
    badge.style.background = 'rgba(231,76,60,0.4)';
  } else {
    badge.textContent = '訓練';
    badge.style.background = '';
  }
}

clockInterval = setInterval(updateClock, 1000);
updateClock();

// === ピリオドスタンプ ===
function stampPeriod(btn, num) {
  const now = new Date();
  const timeStr = fmtTime(now);
  const key = `period_${num}`;
  const label = LABELS[key];

  if (!startTime) startTime = now;
  const elapsedSec = contactTime ? Math.floor((now - contactTime) / 1000) : null;
  const elapsedStr = contactTime ? fmtContactElapsed(elapsedSec) : '---';

  btn.classList.add('pressed');
  btn.querySelector('.p-time').textContent = timeStr.slice(0,5);

  log.push({ time: now, timeStr, label, elapsed: elapsedStr, elapsedSec, key });
  renderLog();
  renderTimeline();
  updatePhaseBar();
}

// === CPR開始 → CPAモード自動切替 ===
function stampAndCPA(btn) {
  // 通常CPRボタンを記録
  stamp(btn);

  if (currentMode !== 'cpa') {
    setMode('cpa');
    // モード切替の視覚フィードバック
    const bar = document.getElementById('modeSelectorBar');
    bar.style.transition = 'background 0.3s';
    bar.style.background = 'rgba(192,57,43,0.3)';
    setTimeout(() => { bar.style.background = ''; }, 800);
  }

  // CPA側のCPRボタンも同時に作動（UI同期）
  const cpaCprBtn = document.getElementById('cpa_cpr_start');
  if (cpaCprBtn && !cpaCprBtn.classList.contains('pressed')) {
    cpaCprBtn.classList.add('pressed');
    const bt = cpaCprBtn.querySelector('.btn-time');
    if (bt) bt.textContent = btn.querySelector('.btn-time').textContent;
  }
}

// === カウント付きスタンプ ===
const stampCounts = {};  // key -> 回数

function stampCount(btn, key) {
  const now = new Date();
  const timeStr = fmtTime(now);
  const label = LABELS[key] || key;

  if (!startTime) startTime = now;
  if (key === 'patient_contact') contactTime = now;

  // カウントアップ
  stampCounts[key] = (stampCounts[key] || 0) + 1;
  const count = stampCounts[key];

  // 経過時間
  const elapsedSec = contactTime ? Math.floor((now - contactTime) / 1000) : null;
  const elapsedStr = contactTime ? fmtContactElapsed(elapsedSec) : '---';

  // ボタン更新（同じkeyの全ボタンを同期）
  document.querySelectorAll(`[data-key="${key}"]`).forEach(b => {
    b.classList.add('pressed');
    const bt = b.querySelector('.btn-time');
    const bc = b.querySelector('.btn-count');
    if (bt) bt.textContent = timeStr;
    if (bc) {
      bc.style.display = 'block';
      bc.textContent = `${count}回実施`;
    }
  });
  // cpa_プレフィックスのIDも同期
  document.querySelectorAll(`[id^="cpa_"][id$="${key.replace('_','')}"], [id^="cpa_${key.split('_')[0]}"]`).forEach(b => {
    const bc = b.querySelector('.btn-count');
    if (bc) { bc.style.display='block'; bc.textContent=`${count}回実施`; }
  });

  // 除細動実施 → 直前のAED解析完了からの時間を計算して履歴に追記
  if (key === 'aed_shock') {
    const aedEnds = log.filter(l => l.key === 'aed_analysis_end');
    if (aedEnds.length > 0) {
      const lastEnd = aedEnds[aedEnds.length - 1];
      const durSec = Math.floor((now - lastEnd.time) / 1000);
      const m = Math.floor(durSec / 60), s = durSec % 60;
      const durStr = `${String(m).padStart(2,'0')}分${String(s).padStart(2,'0')}秒`;
      const banner = document.getElementById('banner_aed_to_shock');
      const list = document.getElementById('list_aed_to_shock');
      if (banner) banner.style.display = 'flex';
      if (list) {
        const row = document.createElement('div');
        row.className = 'dur-row';
        row.innerHTML = `
          <span class="dur-row-num">${count}</span>
          <span class="dur-row-range">解析完了 ${lastEnd.timeStr} → 除細動 ${timeStr}</span>
          <span class="dur-row-val">${durStr}</span>
        `;
        list.appendChild(row);
      }
    }
  }

  // ログ記録
  log.push({ time: now, timeStr, label: `${label}（${count}回目）`, elapsed: elapsedStr, elapsedSec, key });
  renderLog();
  renderTimeline();
  updatePhaseBar();
}

// === STAMP ===
function stamp(btn) {
  const key = btn.dataset.key;
  const now = new Date();

  // Set start reference
  if (key === 'dispatch_out') {
    if (!startTime) startTime = now;
  }
  if (key === 'patient_contact') {
    contactTime = now;
    document.getElementById('elapsedContact').textContent = '00:00';
    // 接触記録後、それ以前のログの elapsed を再計算して更新
    log.forEach(item => {
      const diffSec = Math.floor((item.time - contactTime) / 1000);
      item.elapsed = fmtContactElapsed(diffSec);
    });
  }

  const timeStr = fmtTime(now);
  const label = LABELS[key] || key;

  // 接触からの経過時間を算出（接触前はマイナス表示）
  let elapsedStr = '---';
  let elapsedSec = null;
  if (contactTime) {
    elapsedSec = Math.floor((now - contactTime) / 1000);
    elapsedStr = fmtContactElapsed(elapsedSec);
  } else if (key === 'patient_contact') {
    elapsedStr = '接触 0:00';
    elapsedSec = 0;
  }

  // Update button (時刻 + 接触からの経過)
  btn.classList.add('pressed');
  const btnTime = btn.querySelector('.btn-time');
  btnTime.textContent = timeStr;
  // 接触経過サブラベルがあれば更新、なければ追加
  let btnElapsed = btn.querySelector('.btn-elapsed');
  if (!btnElapsed) {
    btnElapsed = document.createElement('span');
    btnElapsed.className = 'btn-elapsed';
    btn.appendChild(btnElapsed);
  }
  btnElapsed.textContent = contactTime || key === 'patient_contact' ? elapsedStr : '';

  // Add to log
  log.push({ time: now, timeStr, label, elapsed: elapsedStr, elapsedSec, key });
  renderLog();
  renderTimeline();
  updatePhaseBar();
}

// 接触基準の経過時間フォーマット（前後を表示）
function fmtContactElapsed(sec) {
  if (sec === 0) return '接触 +0:00';
  const abs = Math.abs(sec);
  const m = Math.floor(abs / 60);
  const s = abs % 60;
  const sign = sec < 0 ? '前' : '後';
  return `接触${sign} ${sec < 0 ? '-' : '+'}${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// === LOG ===
function renderLog() {
  const list = document.getElementById('logList');
  document.getElementById('logCount').textContent = `${log.length}件`;

  if (log.length === 0) {
    list.innerHTML = '<div class="log-empty">まだ記録がありません</div>';
    return;
  }

  const header = `<div class="log-col-header"><span>時刻</span><span>活動内容</span><span style="text-align:right">接触からの時間</span></div>`;

  const rows = log.map((item) => {
    let cls = 'log-elapsed';
    if (item.elapsedSec === null || item.elapsedSec === undefined) cls += ' before';
    else if (item.elapsedSec < 0) cls += ' before';
    else if (item.elapsedSec === 0) cls += ' zero';
    else cls += ' after';
    const elapsed = item.elapsed || '---';
    return `
      <div class="log-item">
        <span class="log-time">${item.timeStr}</span>
        <span class="log-label">${item.label}</span>
        <span class="${cls}">${elapsed}</span>
      </div>`;
  }).join('');

  list.innerHTML = header + rows;
  list.scrollTop = list.scrollHeight;
}

// === TIMELINE ===
const TIMELINE_ROWS = [
  { key: 'dispatch_out',          label: '出動',          color: '#E74C3C', type: 'point' },
  { key: 'patient_contact',       label: '傷病者接触',    color: '#E74C3C', type: 'point' },
  { keyS: 'assess_primary_start', keyE: 'assess_primary_end',   label: '生理学的評価', color: '#3498DB', type: 'range' },
  { keyS: 'assess_secondary_start', keyE: 'assess_secondary_end', label: '二次評価',   color: '#9B59B6', type: 'range' },
  { key: 'spo2',   label: 'SpO2測定',  color: '#2471A3', type: 'point' },
  { key: 'bp',     label: '血圧測定',  color: '#1A5276', type: 'point' },
  { key: 'ecg',    label: '心電図測定', color: '#117A65', type: 'point' },
  { key: 'ecg12',  label: '12誘導測定', color: '#0E6655', type: 'point' },
  { key: 'rosc',                  label: 'ROSC確認',      color: '#27AE60', type: 'point' },

  { key: 'assist_ventilation',    label: '補助換気',      color: '#16A085', type: 'point' },
  { key: 'o2_start',              label: '酸素投与',      color: '#2980B9', type: 'point' },

function renderTimeline() {
  if (!contactTime && log.length === 0) return;

  // 全ログからmin/maxを取得
  const times = log.map(l => l.time.getTime());
  if (times.length === 0) return;

  const tMin = Math.min(...times);
  const tMax = Math.max(...times);
  const span = Math.max(tMax - tMin, 60000); // 最低1分

  // 描画対象行を絞る（記録があるもののみ）
  const recordedKeys = new Set(log.map(l => l.key));
  const activeRows = TIMELINE_ROWS.filter(row => {
    if (row.type === 'point') return recordedKeys.has(row.key);
    return recordedKeys.has(row.keyS) || recordedKeys.has(row.keyE);
  });

  if (activeRows.length === 0) return;

  // Canvas サイズ
  const ROW_H = 36;
  const LABEL_W = 90;
  const AXIS_H = 28;
  const PAD_R = 12;
  const W = Math.max(380, window.innerWidth - 40);
  const H = activeRows.length * ROW_H + AXIS_H + 8;
  const CHART_W = W - LABEL_W - PAD_R;

  const canvas = document.getElementById('timelineCanvas');
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');

  // 背景
  ctx.fillStyle = '#1A2A3A';
  ctx.fillRect(0, 0, W, H);

  // ヘルパー：時間→X座標
  const tx = t => LABEL_W + ((t - tMin) / span) * CHART_W;

  // グリッド線（目盛り）
  const tickCount = 6;
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= tickCount; i++) {
    const x = LABEL_W + (i / tickCount) * CHART_W;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H - AXIS_H);
    ctx.stroke();
  }

  // 接触ラインを引く
  if (contactTime) {
    const cx = tx(contactTime.getTime());
    ctx.strokeStyle = 'rgba(231,76,60,0.5)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(cx, 0);
    ctx.lineTo(cx, H - AXIS_H);
    ctx.stroke();
    ctx.setLineDash([]);
    // ラベル
    ctx.fillStyle = 'rgba(231,76,60,0.85)';
    ctx.font = 'bold 9px sans-serif';
    ctx.fillText('接触', cx + 2, 10);
  }

  // 各行を描画
  activeRows.forEach((row, i) => {
    const y = i * ROW_H;
    const midY = y + ROW_H / 2;

    // 行背景（交互）
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.1)';
    ctx.fillRect(LABEL_W, y, CHART_W, ROW_H);

    // ラベル
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(row.label, LABEL_W - 6, midY + 4);
    ctx.textAlign = 'left';

    if (row.type === 'point') {
      // 同じキーの全記録（複数回対応）
      const items = log.filter(l => l.key === row.key);
      items.forEach(item => {
        const x = tx(item.time.getTime());
        // ダイヤモンド型マーカー
        ctx.fillStyle = row.color;
        ctx.beginPath();
        ctx.moveTo(x, midY - 7);
        ctx.lineTo(x + 6, midY);
        ctx.lineTo(x, midY + 7);
        ctx.lineTo(x - 6, midY);
        ctx.closePath();
        ctx.fill();
        // 時刻ラベル（小）
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.font = '8px sans-serif';
        ctx.fillText(item.timeStr.slice(0,5), x - 10, midY - 9);
      });

    } else {
      // range：開始〜終了バー（複数回分）
      const starts = log.filter(l => l.key === row.keyS);
      const ends   = log.filter(l => l.key === row.keyE);
      const count = Math.max(starts.length, ends.length);
      for (let n = 0; n < count; n++) {
        const sItem = starts[n];
        const eItem = ends[n];
        const xS = sItem ? tx(sItem.time.getTime()) : null;
        const xE = eItem ? tx(eItem.time.getTime()) : null;
        const barH = 12;
        const barY = midY - barH / 2;
        const alpha = count > 1 ? 0.6 + n * 0.2 : 1;

        if (xS !== null && xE !== null) {
          // バー
          ctx.globalAlpha = alpha;
          ctx.fillStyle = row.color;
          ctx.beginPath();
          roundRectCtx(ctx, xS, barY, xE - xS, barH, 3);
          ctx.fill();
          // 所要時間ラベル
          const durSec = Math.floor((eItem.time - sItem.time) / 1000);
          const dm = Math.floor(durSec / 60), ds = durSec % 60;
          const durLabel = `${dm}:${String(ds).padStart(2,'0')}`;
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 8px sans-serif';
          const bw = xE - xS;
          if (bw > 24) ctx.fillText(durLabel, xS + bw/2 - ctx.measureText(durLabel).width/2, midY + 3);
          ctx.globalAlpha = 1;
        } else if (xS !== null) {
          // 開始のみ（進行中）
          ctx.globalAlpha = alpha;
          ctx.fillStyle = row.color;
          ctx.beginPath();
          ctx.moveTo(xS, midY - 8);
          ctx.lineTo(xS + 16, midY);
          ctx.lineTo(xS, midY + 8);
          ctx.closePath();
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        // 開始ティック
        if (xS !== null) {
          ctx.fillStyle = row.color;
          ctx.fillRect(xS - 1, barY - 2, 2, barH + 4);
        }
      }
    }
  });

  // 時間軸
  const axisY = H - AXIS_H + 4;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(LABEL_W, H - AXIS_H, CHART_W, AXIS_H);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i <= tickCount; i++) {
    const t = tMin + (i / tickCount) * span;
    const d = new Date(t);
    const label = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const x = LABEL_W + (i / tickCount) * CHART_W;
    ctx.fillText(label, x, axisY + 14);
  }
  ctx.textAlign = 'left';

  // 表示
  document.getElementById('timelineTitle').style.display = '';
  document.getElementById('timelineWrap').style.display = '';
}

function roundRectCtx(ctx, x, y, w, h, r) {
  if (w < 2*r) r = w/2;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// === PHASE BAR ===
const PHASE_ORDER = ['dispatch','scene','treatment','transport','hospital'];
const PHASE_KEYS = {
  dispatch: ['dispatch_out'],
  scene: ['patient_contact'],
  treatment: ['period_1','period_2','period_3','period_4','period_5','assess_primary_start','assess_primary_end','assess_secondary_start','assess_secondary_end','spo2','bp','ecg','ecg12','rosc','assist_ventilation','o2_start','cpr_start','aed_analysis_start','aed_analysis_end','aed_shock','iv_access_start','iv_access_end','adrenaline','advanced_airway','glucose','scene_leave','stretcher','car_load'],
  transport: ['hospital_call_start','hospital_call_end','transport_start'],
  hospital: ['hospital_arrive','handover']
};

function updatePhaseBar() {
  const donePhases = new Set();
  const activePhases = new Set();
  const recordedKeys = new Set(log.map(l => l.key));

  PHASE_ORDER.forEach(phase => {
    const keys = PHASE_KEYS[phase];
    if (keys.some(k => recordedKeys.has(k))) activePhases.add(phase);
  });

  // Mark phases done if next phase started
  PHASE_ORDER.forEach((phase, i) => {
    if (i < PHASE_ORDER.length - 1) {
      const nextPhase = PHASE_ORDER[i + 1];
      if (activePhases.has(nextPhase)) donePhases.add(phase);
    }
  });

  document.querySelectorAll('.phase-pill').forEach(pill => {
    const p = pill.dataset.phase;
    pill.className = 'phase-pill';
    if (donePhases.has(p)) pill.classList.add('done');
    else if (activePhases.has(p)) pill.classList.add('active');
  });
}

const toggleStartTimes = {};
const toggleCounts = {};  // 各ボタンの計測回数

function addDurRow(listId, count, startT, endT, durStr) {
  const list = document.getElementById(listId);
  if (!list) return;
  const row = document.createElement('div');
  row.className = 'dur-row';
  row.innerHTML = `
    <span class="dur-row-num">${count}</span>
    <span class="dur-row-range">${fmtTime(startT)} ～ ${fmtTime(endT)}</span>
    <span class="dur-row-val">${durStr}</span>

function toggleMeasure(btn) {
  const state = btn.dataset.state;
  const now = new Date();
  const timeStr = fmtTime(now);
  const keyStart = btn.dataset.keyStart;
  const keyEnd   = btn.dataset.keyEnd;
  const bannerId = btn.dataset.banner;
  const listId   = 'list_' + bannerId.replace('banner_', '');

  const elapsedStr = contactTime ? fmtContactElapsed(Math.floor((now - contactTime) / 1000)) : '---';
  const elapsedSec = contactTime ? Math.floor((now - contactTime) / 1000) : null;

  if (state === 'idle' || state === 'done') {
    // 開始（初回 or 再計測）
    toggleStartTimes[keyStart] = now;
    if (!toggleCounts[keyStart]) toggleCounts[keyStart] = 0;
    btn.dataset.state = 'running';
    btn.classList.remove('pressed');
    btn.querySelector('.toggle-label').textContent = btn.dataset.labelRunning;
    btn.querySelector('.btn-time').textContent = `開始 ${timeStr}`;
    if (!startTime) startTime = now;
    const count = toggleCounts[keyStart] + 1;
    const baseName = btn.dataset.labelIdle.replace('開始','').trim();
    log.push({ time: now, timeStr, label: `${baseName} 開始（${count}回目）`, elapsed: elapsedStr, elapsedSec, key: keyStart });
    renderLog();
    renderTimeline();
    updatePhaseBar();

  } else if (state === 'running') {
    // 終了
    btn.dataset.state = 'done';
    btn.classList.add('pressed');

    const startT = toggleStartTimes[keyStart];
    const durSec = startT ? Math.floor((now - startT) / 1000) : 0;
    const m = Math.floor(durSec / 60);
    const s = durSec % 60;
    const durStr = `${String(m).padStart(2,'0')}分${String(s).padStart(2,'0')}秒`;

    toggleCounts[keyStart] = (toggleCounts[keyStart] || 0) + 1;
    const count = toggleCounts[keyStart];
    const baseName = btn.dataset.labelDone.replace('✅ ','').trim();

    btn.querySelector('.toggle-label').textContent = `✅ ${baseName}（${count}回）`;
    btn.querySelector('.btn-time').textContent = `完了 ${timeStr} → 再計測可`;

    // バナー・リスト更新
    const banner = document.getElementById(bannerId);
    if (banner) {
      banner.style.display = 'flex';
      addDurRow(listId, count, startT, now, durStr);
    }

    log.push({ time: now, timeStr, label: `${baseName}（${count}回目 所要 ${durStr}）`, elapsed: elapsedStr, elapsedSec, key: keyEnd });
    renderLog();
    renderTimeline();
    updatePhaseBar();
  }
}

// rrect: ctx.roundRect の互換ポリフィル
function rrect(ctx, x, y, w, h, r) {
  if (w < 2*r) r = w/2;
  if (h < 2*r) r = h/2;
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

async function generatePDF() {
  if (log.length === 0) {
    alert('記録がありません。まずタイムスタンプを記録してください。');
    return;
  }

  const { jsPDF } = window.jspdf;
  const now = new Date();
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  const nowStr = fmtTime(now);
  const caseNo      = document.getElementById('caseNo').value || '未入力';
  const patientName = document.getElementById('patientName').value || '未入力';
  const patientAge  = document.getElementById('patientAge').value || '';
  const callType    = document.getElementById('callType').value || '未入力';
  const severity    = document.getElementById('severity').value || '未入力';
  const memo        = document.getElementById('memo').value || '';

  // ── 計測履歴サマリー収集 ──
  const TOGGLE_DEFS = [
    { keyS:'assess_primary_start',   keyE:'assess_primary_end',   label:'生理学的評価' },
    { keyS:'assess_secondary_start', keyE:'assess_secondary_end', label:'二次評価' },
    { keyS:'aed_analysis_start',     keyE:'aed_analysis_end',     label:'AED解析' },
    { keyS:'iv_access_start',        keyE:'iv_access_end',        label:'静脈路確保' },
    { keyS:'hospital_call_start',    keyE:'hospital_call_end',    label:'病院連絡' },
  ];
  const summaries = [];
  TOGGLE_DEFS.forEach(def => {
    const starts = log.filter(l => l.key === def.keyS);
    const ends   = log.filter(l => l.key === def.keyE);
    if (!starts.length) return;
    starts.forEach((s, i) => {
      const e = ends[i];
      if (e) {
        const sec = Math.floor((e.time - s.time)/1000);
        const m = Math.floor(sec/60), ss = sec%60;
        summaries.push(`${def.label}（${i+1}回目）: ${s.timeStr} 〜 ${e.timeStr}  所要 ${String(m).padStart(2,'0')}分${String(ss).padStart(2,'0')}秒`);
      } else {
        summaries.push(`${def.label}（${i+1}回目）: ${s.timeStr} 〜 未完了`);
      }
    });
  });

  // ── Canvas設定 ──
  const W = 595 * 2;
  const PAGE_H = 842 * 2;
  const MG = 44;
  const ROW_H = 42;
  const HEADER_H = 110;
  const INFO_H = 170;
  const TBL_HEAD_H = 44;
  const MEMO_H = memo ? Math.max(80, Math.ceil(memo.length/36)*28 + 52) : 0;
  const SUM_H  = summaries.length ? summaries.length*32 + 64 : 0;
  const FOOTER_H = 54;
  const total1 = HEADER_H + INFO_H + TBL_HEAD_H + log.length*ROW_H
    + (SUM_H ? SUM_H+24 : 0) + (MEMO_H ? MEMO_H+24 : 0) + FOOTER_H + 30;
  const pageCount1 = Math.ceil(total1 / PAGE_H);
  const canvas1H = pageCount1 * PAGE_H;

  const canvas1 = document.createElement('canvas');
  canvas1.width = W; canvas1.height = canvas1H;
  const ctx = canvas1.getContext('2d');

  const T = (t, x, y, font, col, align) => {
    ctx.font = font||'18px sans-serif';
    ctx.fillStyle = col||'#222';
    ctx.textAlign = align||'left';
    ctx.fillText(t, x, y);
    ctx.textAlign = 'left';
  };
  const BG = (y, h, col) => { ctx.fillStyle=col; ctx.fillRect(0,y,W,h); };

  BG(0, canvas1H, '#FFF');

  // ── ページ1 ヘッダー ──
  BG(0, HEADER_H, '#C0392B');
  T('救急活動 タイムスタンプ記録', MG, 50, 'bold 32px sans-serif', '#fff');
  T(`訓練記録　${dateStr}　${nowStr} 作成`, MG, 84, '19px sans-serif', 'rgba(255,255,255,0.8)');
  ctx.fillStyle='rgba(255,255,255,0.2)';
  rrect(ctx, W-155,28,118,44,8); ctx.fill();
  T('【訓練】', W-145, 57, 'bold 22px sans-serif', '#fff');

  // ── 基本情報 ──
  let y = HEADER_H + 8;
  BG(y, INFO_H, '#F7F7F7');
  ctx.strokeStyle='#DDD'; ctx.lineWidth=1; ctx.strokeRect(MG, y, W-MG*2, INFO_H);
  T('基本情報', MG+14, y+30, 'bold 18px sans-serif', '#C0392B');
  const infoL = [['案件番号', caseNo],['傷病者', `${patientName}　${patientAge}`]];
  const infoR = [['覚知区分', callType],['重症度', severity]];
  infoL.forEach((r,i)=>{ T(r[0], MG+14, y+58+i*46, 'bold 14px sans-serif','#888'); T(r[1], MG+14+115, y+58+i*46,'20px sans-serif','#111'); });
  infoR.forEach((r,i)=>{ T(r[0], W/2+20, y+58+i*46, 'bold 14px sans-serif','#888'); T(r[1], W/2+20+115, y+58+i*46,'20px sans-serif','#111'); });
  if (contactTime) {
    T('傷病者接触時刻', MG+14, y+152, 'bold 14px sans-serif','#888');
    T(fmtTime(contactTime), MG+14+145, y+152, 'bold 22px sans-serif','#C0392B');
  }

  // ── 表ヘッダー ──
  y += INFO_H + 14;
  BG(y, TBL_HEAD_H, '#1A2A3A');
  T('活動記録', MG+12, y+28, 'bold 17px sans-serif','#D4AC0D');
  T('時刻', MG+830, y+28, 'bold 16px sans-serif','#fff');
  T('接触からの時間', MG+970, y+28, 'bold 14px sans-serif','#fff');
  y += TBL_HEAD_H;

  // ── ログ行 ──
  const phColors={dispatch:'#E74C3C',scene:'#E74C3C',treatment:'#3498DB',transport:'#E67E22',hospital:'#27AE60'};
  log.forEach((item, i) => {
    BG(y, ROW_H, i%2===0?'#FAFAFA':'#FFF');
    const ph = Object.keys(PHASE_KEYS).find(p=>PHASE_KEYS[p].includes(item.key));
    ctx.fillStyle = phColors[ph]||'#BDC3C7';
    ctx.fillRect(MG, y, 5, ROW_H);
    T(String(i+1), MG+12, y+27, '13px sans-serif','#AAA');
    ctx.font='17px sans-serif'; ctx.fillStyle='#222';
    let lbl=item.label;
    const maxW = MG+820 - (MG+44);
    while(ctx.measureText(lbl).width>maxW && lbl.length>4) lbl=lbl.slice(0,-1);
    if(lbl!==item.label) lbl+='…';
    ctx.fillText(lbl, MG+44, y+27);
    T(item.timeStr, MG+830, y+27, 'bold 17px sans-serif','#C0392B');
    const elCol = !item.elapsedSec && item.elapsedSec!==0?'#5DADE2':item.elapsedSec<0?'#5DADE2':item.elapsedSec===0?'#D4AC0D':'#27AE60';
    T(item.elapsed||'---', MG+970, y+27, '15px sans-serif', elCol);
    y += ROW_H;
  });
  ctx.strokeStyle='#DDD'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(MG,y); ctx.lineTo(W-MG,y); ctx.stroke();

  // ── 計測サマリー ──
  if (summaries.length) {
    y += 22;
    BG(y, SUM_H, '#FFFDF0');
    ctx.strokeStyle='#D4AC0D'; ctx.lineWidth=2; ctx.strokeRect(MG,y,W-MG*2,SUM_H);
    T('計測履歴サマリー', MG+14, y+36, 'bold 18px sans-serif','#D4AC0D');
    summaries.forEach((s,i)=>{ T(s, MG+20, y+66+i*32, '15px sans-serif','#333'); });
    y += SUM_H;
  }

  // ── メモ ──
  if (memo) {
    y += 22;
    BG(y, MEMO_H, '#F7F7F7');
    ctx.strokeStyle='#DDD'; ctx.lineWidth=1; ctx.strokeRect(MG,y,W-MG*2,MEMO_H);
    T('特記事項・メモ', MG+14, y+30, 'bold 18px sans-serif','#C0392B');
    for(let s=0,ri=0; s<memo.length; s+=36,ri++) T(memo.slice(s,s+36), MG+20, y+58+ri*28, '16px sans-serif','#333');
    y += MEMO_H;
  }

  // ── フッター（各ページ末尾に固定） ──
  for (let p=0; p<pageCount1; p++) {
    const fy = p*PAGE_H + PAGE_H - FOOTER_H;
    ctx.fillStyle='#F0F0F0'; ctx.fillRect(0,fy,W,FOOTER_H);
    ctx.strokeStyle='#CCC'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,fy); ctx.lineTo(W,fy); ctx.stroke();
    T(`救急活動タイムスタンプ記録　訓練用　案件：${caseNo}　記録数：${log.length}件　${dateStr} ${nowStr}  ${p+1}/${pageCount1+1}ページ`,
      MG, fy+34, '13px sans-serif','#888');
  }

  // ── Page2: タイムライングラフ ──
  const times = log.map(l=>l.time.getTime());
  const tMin=Math.min(...times), tMax=Math.max(...times);
  const span=Math.max(tMax-tMin, 60000);

  const rKeys=new Set(log.map(l=>l.key));
  const aRows=TIMELINE_ROWS.filter(row=>{
    if(row.type==='point') return rKeys.has(row.key);
    return rKeys.has(row.keyS)||rKeys.has(row.keyE);
  });

  const LBL_W=190, PAD_R=30, TL_TOP=96, RH=52, AX_H=50;
  const TL_W=W-LBL_W-PAD_R;
  const tx=t=>LBL_W+((t-tMin)/span)*TL_W;

  // canvas2の高さをコンテンツに合わせて計算
  const TL_HEADER_H=80, TL_FOOTER_H=54;
  const TL_CONTENT_H = TL_HEADER_H + TL_TOP-TL_HEADER_H + aRows.length*RH + AX_H + TL_FOOTER_H + 20;
  const TL_PAGE_COUNT = Math.ceil(TL_CONTENT_H / PAGE_H);
  const canvas2H = TL_PAGE_COUNT * PAGE_H;

  const canvas2 = document.createElement('canvas');
  canvas2.width = W; canvas2.height = canvas2H;
  const c2 = canvas2.getContext('2d');
  c2.fillStyle='#FFF'; c2.fillRect(0,0,W,canvas2H);

  // グラフヘッダー
  c2.fillStyle='#1A2A3A'; c2.fillRect(0,0,W,TL_HEADER_H);
  c2.font='bold 28px sans-serif'; c2.fillStyle='#D4AC0D';
  c2.fillText('活動タイムライングラフ', MG, 48);
  c2.font='17px sans-serif'; c2.fillStyle='rgba(255,255,255,0.7)';
  c2.fillText(`案件：${caseNo}　${dateStr}`, W-500, 48);

  // グリッド
  for(let i=0;i<=8;i++){
    const x=LBL_W+(i/8)*TL_W;
    c2.strokeStyle='rgba(0,0,0,0.06)'; c2.lineWidth=1;
    c2.beginPath(); c2.moveTo(x,TL_TOP); c2.lineTo(x,TL_TOP+aRows.length*RH); c2.stroke();
  }
  // 接触ライン
  if(contactTime){
    const cx=tx(contactTime.getTime());
    c2.strokeStyle='rgba(192,57,43,0.45)'; c2.lineWidth=2; c2.setLineDash([6,4]);
    c2.beginPath(); c2.moveTo(cx,TL_TOP-6); c2.lineTo(cx,TL_TOP+aRows.length*RH+6); c2.stroke();
    c2.setLineDash([]);
    c2.fillStyle='rgba(192,57,43,0.8)'; c2.font='bold 13px sans-serif';
    c2.fillText('接触',cx+4,TL_TOP-8);
  }

  aRows.forEach((row,i)=>{
    const ry=TL_TOP+i*RH, midY=ry+RH/2;
    c2.fillStyle=i%2===0?'#F8F8F8':'#FFF';
    c2.fillRect(LBL_W,ry,TL_W,RH);
    // ラベル
    c2.fillStyle='#333'; c2.font='12px sans-serif'; c2.textAlign='right';
    c2.fillText(row.label, LBL_W-8, midY+4);
    c2.textAlign='left';

    if(row.type==='point'){
      log.filter(l=>l.key===row.key).forEach(item=>{
        const x=tx(item.time.getTime());
        c2.fillStyle=row.color;
        c2.beginPath(); c2.arc(x,midY,8,0,Math.PI*2); c2.fill();
        c2.fillStyle='rgba(0,0,0,0.5)'; c2.font='11px sans-serif';
        c2.fillText(item.timeStr.slice(0,5),x-14,midY-12);
      });
    } else {
      const ss2=log.filter(l=>l.key===row.keyS);
      const ee2=log.filter(l=>l.key===row.keyE);
      ss2.forEach((s,n)=>{
        const e=ee2[n];
        const xS=tx(s.time.getTime());
        const bH=16,bY=midY-bH/2;
        if(e){
          const xE=tx(e.time.getTime());
          c2.fillStyle=row.color; c2.globalAlpha=0.85;
          rrect(c2, xS,bY,xE-xS,bH,4); c2.fill();
          c2.globalAlpha=1;
          const ds=Math.floor((e.time-s.time)/1000);
          const dl=`${Math.floor(ds/60)}:${String(ds%60).padStart(2,'0')}`;
          c2.fillStyle='#fff'; c2.font='bold 11px sans-serif'; c2.textAlign='center';
          if(xE-xS>30) c2.fillText(dl,xS+(xE-xS)/2,midY+4);
          c2.textAlign='left';
        } else {
          c2.fillStyle=row.color; c2.globalAlpha=0.6;
          c2.beginPath(); c2.moveTo(xS,bY); c2.lineTo(xS+18,midY); c2.lineTo(xS,bY+bH); c2.closePath(); c2.fill();
          c2.globalAlpha=1;
        }
        c2.fillStyle='rgba(0,0,0,0.4)'; c2.font='11px sans-serif';
        c2.fillText(s.timeStr.slice(0,5),xS,bY-3);
      });
    }
  });

  // 時間軸
  const axY=TL_TOP+aRows.length*RH;
  c2.fillStyle='#EFEFEF'; c2.fillRect(LBL_W,axY,TL_W,AX_H);
  c2.strokeStyle='#CCC'; c2.lineWidth=1; c2.beginPath(); c2.moveTo(LBL_W,axY); c2.lineTo(W-PAD_R,axY); c2.stroke();
  c2.fillStyle='#555'; c2.font='12px sans-serif'; c2.textAlign='center';
  for(let i=0;i<=8;i++){
    const t=tMin+(i/8)*span, d=new Date(t);
    const lb=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    c2.fillText(lb, LBL_W+(i/8)*TL_W, axY+26);
  }
  c2.textAlign='left';

  // フッター（各グラフページ末尾）
  const totalPages = pageCount1 + TL_PAGE_COUNT;
  for(let p=0; p<TL_PAGE_COUNT; p++){
    const fy = p*PAGE_H + PAGE_H - TL_FOOTER_H;
    c2.fillStyle='#F0F0F0'; c2.fillRect(0,fy,W,TL_FOOTER_H);
    c2.strokeStyle='#CCC'; c2.lineWidth=1; c2.beginPath(); c2.moveTo(0,fy); c2.lineTo(W,fy); c2.stroke();
    c2.fillStyle='#888'; c2.font='13px sans-serif';
    c2.fillText(`救急活動タイムスタンプ記録　訓練用　案件：${caseNo}　${dateStr} ${nowStr}　${pageCount1+p+1}/${totalPages}ページ`, MG, fy+34);
  }

  // ── PDF組み立て ──
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  // page1〜: ログ表
  for(let p=0; p<pageCount1; p++){
    if(p>0) doc.addPage();
    const oc=document.createElement('canvas');
    oc.width=W; oc.height=PAGE_H;
    const oc2=oc.getContext('2d');
    oc2.drawImage(canvas1, 0, -p*PAGE_H);
    doc.addImage(oc.toDataURL('image/jpeg',0.92),'JPEG',0,0,210,297);
  }
  // タイムライングラフページ（複数ページ対応）
  for(let p=0; p<TL_PAGE_COUNT; p++){
    doc.addPage();
    const oc=document.createElement('canvas');
    oc.width=W; oc.height=PAGE_H;
    const oc2=oc.getContext('2d');
    oc2.drawImage(canvas2, 0, -p*PAGE_H);
    doc.addImage(oc.toDataURL('image/jpeg',0.92),'JPEG',0,0,210,297);
  }

  const filename=`救急記録_${caseNo}_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.pdf`;
  doc.save(filename);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
</script>
